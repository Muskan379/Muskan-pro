<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome Muskan</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      overflow: hidden;
    }

    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      padding: 50px;
      border-radius: 25px;
      text-align: center;
      color: white;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      animation: fadeIn 1.2s ease;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 15px;
      letter-spacing: 2px;
    }

    p {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 25px;
    }

    button {
      padding: 12px 28px;
      border: none;
      border-radius: 50px;
      background: white;
      color: #ff4f81;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      transform: scale(1.08);
      background: #ffe6ee;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      animation: float 6s infinite ease-in-out;
    }

    .circle:nth-child(1) {
      width: 120px;
      height: 120px;
      top: 10%;
      left: 15%;
    }

    .circle:nth-child(2) {
      width: 180px;
      height: 180px;
      bottom: 10%;
      right: 10%;
      animation-delay: 2s;
    }

    @keyframes float {
      0%,100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-20px);
      }
    }
  </style>
</head>

<body>

  <div class="circle"></div>
  <div class="circle"></div>

  <div class="card">
    <h1>Welcome Muskan 💖</h1>
    <p>Wishing you happiness, smiles, and beautiful moments always.</p>
    <button>Explore More</button>
  </div>

</body>
</html>
